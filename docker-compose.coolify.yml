# =====================================================================
# CS Okey — Coolify Production Compose (ONLINE / multiplayer)
# =====================================================================
# ONE Node service serves the built SPA (online build) + the API + Socket.IO,
# same-origin. SQLite lives on a PERSISTENT volume so users/sessions/games survive
# redeploys ("redeploy'da kullanıcılar ve ayarlar silinmesin").
#
# Coolify: Build Pack = Docker Compose, path = docker-compose.coolify.yml, branch main.
# Set JWT_SECRET + ADMIN_PASSWORD as Coolify Environment Variables (Secret).
# Coolify magic: SERVICE_FQDN_OKEY_3000 maps okey.codesnap.nl → container :3000 + TLS.
# IMPORTANT: mark the `okey-data` volume as Persistent in Coolify.
# =====================================================================

services:
  okey:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - SERVICE_FQDN_OKEY_3000
      - NODE_ENV=production
      - PORT=3000
      - CS_OKEY_DB=/data/cs-okey.sqlite
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://okey.codesnap.nl}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - BCRYPT_COST=${BCRYPT_COST:-12}
      - BOT_DELAY_MS=${BOT_DELAY_MS:-600}
    volumes:
      # PERSISTENT — mark as Persistent Storage in Coolify so a redeploy keeps the DB.
      - okey-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - coolify.managed=true

volumes:
  okey-data:
