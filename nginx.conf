server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the fly.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Hashed build assets (Vite emits content-hashed filenames) — cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — unknown paths serve index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must never be cached, so a redeploy is picked up at once.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
